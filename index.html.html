// ─── Game state ────────────────────────────────────────────────────────────
const MAIN_LEVELS = 10;        // levels 1-10 are the main game
const BONUS_DEATH_LIMIT = 10;  // must beat main game in <10 deaths to unlock bonus
let levelIndex = 0;
let deaths = 0;
let state = 'menu'; // 'menu' | 'playing' | 'win' | 'bonus_locked'
let gameMode = 'easy'; // 'easy' | 'hard'
let coinsCollected = [];

// Menu button rects (used for click detection)
const MENU_EASY_BTN = { x: 160, y: 240, w: 180, h: 60 };
const MENU_HARD_BTN = { x: 460, y: 240, w: 180, h: 60 };

// ─── Player ────────────────────────────────────────────────────────────────
const PLAYER_W = 28;
const PLAYER_H = 36;
const GRAVITY  = 0.55;
const JUMP_FORCE = -13;
const SPEED = 4.5;

let player = {};
let keys = {};

function resetPlayer() {
  const sp = LEVELS[levelIndex].spawn;
  player = {
    x: sp.x, y: sp.y,
    vx: 0, vy: 0,
    onGround: false,
    jumping: false,
  };
}

function loadLevel(i) {
  levelIndex = i;
  resetPlayer();
  coinsCollected = new Array(LEVELS[i].coins.length).fill(false);
  if (i >= MAIN_LEVELS) {
    document.getElementById('levelDisplay').textContent = `B${i - MAIN_LEVELS + 1}`;
  } else {
    document.getElementById('levelDisplay').textContent = i + 1;
  }
  updateCoinUI();
}

function startGame(mode) {
  gameMode = mode;
  state = 'playing';
  deaths = 0;
  document.getElementById('deathDisplay').textContent = 0;
  loadLevel(0);
}

function updateCoinUI() {
  const got = coinsCollected.filter(Boolean).length;
  const total = LEVELS[levelIndex].coins.length;
  document.getElementById('coinDisplay').textContent = `${got}/${total}`;
}

// ─── Input ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

function isLeft()  { return keys['ArrowLeft']  || keys['a'] || keys['A']; }
function isRight() { return keys['ArrowRight'] || keys['d'] || keys['D']; }
function isJump()  { return keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']; }

// ─── AABB collision helper ─────────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx &&
         ay < by + bh && ay + ah > by;
}

// ─── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  if (state !== 'playing') return;

  const level = LEVELS[levelIndex];
  if (!level) return;

  // Horizontal movement
  player.vx = 0;
  if (isLeft())  player.vx = -SPEED;
  if (isRight()) player.vx =  SPEED;

  // Jump
  if (isJump() && player.onGround && !player.jumping) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.jumping = true;
  }
  if (!isJump()) player.jumping = false;

  // Gravity
  player.vy += GRAVITY * dt;

  // Move X then resolve
  player.x += player.vx * dt;
  for (const p of level.platforms) {
    if (rectsOverlap(player.x, player.y, PLAYER_W, PLAYER_H, p.x, p.y, p.w, p.h)) {
      if (player.vx > 0) player.x = p.x - PLAYER_W;
      if (player.vx < 0) player.x = p.x + p.w;
    }
  }

  // Move Y then resolve
  player.onGround = false;
  player.y += player.vy * dt;
  for (const p of level.platforms) {
    if (rectsOverlap(player.x, player.y, PLAYER_W, PLAYER_H, p.x, p.y, p.w, p.h)) {
      if (player.vy > 0) { // falling onto platform
        player.y = p.y - PLAYER_H;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0) { // hitting ceiling
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Wall clamp
  if (player.x < 0) player.x = 0;
  if (player.x + PLAYER_W > W) player.x = W - PLAYER_W;

  // Fell off screen
  if (player.y > H) { die(); return; }

  // Spike collision (shrink hitbox slightly for fairness)
  for (const s of level.spikes) {
    if (rectsOverlap(player.x + 4, player.y + 4, PLAYER_W - 8, PLAYER_H - 4,
                     s.x, s.y, s.w, s.h)) {
      die();
      return;
    }
  }

  // Coin collection
  let coinChanged = false;
  for (let i = 0; i < level.coins.length; i++) {
    if (!coinsCollected[i]) {
      const c = level.coins[i];
      if (rectsOverlap(player.x + 4, player.y + 4, PLAYER_W - 8, PLAYER_H - 8,
                       c.x - 10, c.y - 10, 20, 20)) {
        coinsCollected[i] = true;
        coinChanged = true;
      }
    }
  }
  if (coinChanged) updateCoinUI();

  // Goal collision — only if all coins collected
  const allCoins = coinsCollected.every(Boolean);
  const g = level.goal;
  if (allCoins && rectsOverlap(player.x, player.y, PLAYER_W, PLAYER_H, g.x, g.y, g.w, g.h)) {
    if (levelIndex === MAIN_LEVELS - 1) {
      // Just beat level 10 — check if bonus is unlocked
      if (deaths < BONUS_DEATH_LIMIT) {
        loadLevel(levelIndex + 1); // continue to bonus levels
      } else {
        state = 'bonus_locked'; // show "not enough skill" screen
      }
    } else if (levelIndex + 1 < LEVELS.length) {
      loadLevel(levelIndex + 1);
    } else {
      state = 'win';
    }
  }
}

function die() {
  deaths++;
  document.getElementById('deathDisplay').textContent = deaths;
  resetPlayer();
  if (gameMode === 'hard') {
    coinsCollected = new Array(LEVELS[levelIndex].coins.length).fill(false);
    updateCoinUI();
  }
}

// ─── Draw helpers ──────────────────────────────────────────────────────────
function drawSpike(s) {
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  const cols = Math.floor(s.w / 20);
  for (let i = 0; i < cols; i++) {
    const tx = s.x + i * 20;
    if (s.dir === 'up') {
      ctx.moveTo(tx,      s.y + s.h);
      ctx.lineTo(tx + 10, s.y);
      ctx.lineTo(tx + 20, s.y + s.h);
    } else if (s.dir === 'down') {
      ctx.moveTo(tx,      s.y);
      ctx.lineTo(tx + 10, s.y + s.h);
      ctx.lineTo(tx + 20, s.y);
    }
  }
  ctx.closePath();
  ctx.fill();
}

function drawCoin(c, index) {
  const pulse = 0.75 + 0.25 * Math.sin(Date.now() / 180 + index);
  ctx.save();
  ctx.shadowColor = '#ffe66d';
  ctx.shadowBlur = 12 * pulse;
  ctx.fillStyle = '#ffe66d';
  ctx.beginPath();
  ctx.arc(c.x, c.y, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#b8860b';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', c.x, c.y);
  ctx.restore();
}

function drawGoal(g, locked) {
  const cx = g.x + g.w / 2, cy = g.y + g.h / 2;
  if (locked) {
    // Dim grey locked portal
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(cx, cy, g.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#aaa';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🔒', cx, cy);
  } else {
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 300);
    ctx.save();
    ctx.shadowColor = '#f5a623';
    ctx.shadowBlur = 20 * pulse;
    ctx.fillStyle = `rgba(245, 166, 35, ${pulse})`;
    ctx.beginPath();
    ctx.arc(cx, cy, g.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⬆', cx, cy);
  }
}

function drawPlayer() {
  const x = player.x, y = player.y;
  // Body
  ctx.fillStyle = '#4ecdc4';
  ctx.fillRect(x + 4, y + 12, PLAYER_W - 8, PLAYER_H - 12);
  // Head
  ctx.fillStyle = '#ffe66d';
  ctx.fillRect(x + 6, y, PLAYER_W - 12, 16);
  // Eyes
  ctx.fillStyle = '#222';
  if (player.vx >= 0) {
    ctx.fillRect(x + PLAYER_W - 12, y + 4, 4, 4);
  } else {
    ctx.fillRect(x + 8, y + 4, 4, 4);
  }
  // Legs
  ctx.fillStyle = '#3a86ff';
  ctx.fillRect(x + 4,            y + PLAYER_H - 10, 10, 10);
  ctx.fillRect(x + PLAYER_W - 14, y + PLAYER_H - 10, 10, 10);
}

// ─── Menu draw ─────────────────────────────────────────────────────────────
function drawMenu() {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(1, '#16213e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffe66d';
  ctx.font = 'bold 56px monospace';
  ctx.fillText('PLATFORMER', W / 2, 110);

  ctx.fillStyle = '#aaa';
  ctx.font = '20px monospace';
  ctx.fillText('Choose your difficulty', W / 2, 160);

  // Helper to draw a button
  function drawBtn(btn, label, color, desc) {
    // Check hover
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 10);
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.font = 'bold 26px monospace';
    ctx.fillText(label, btn.x + btn.w / 2, btn.y + 28);
    ctx.fillStyle = '#333';
    ctx.font = '13px monospace';
    ctx.fillText(desc, btn.x + btn.w / 2, btn.y + 48);
  }

  drawBtn(MENU_EASY_BTN, 'EASY', '#2ecc71', 'coins kept on death');
  drawBtn(MENU_HARD_BTN, 'HARD', '#e94560', 'coins reset on death');

  ctx.fillStyle = '#555';
  ctx.font = '14px monospace';
  ctx.fillText('Click a button to start  •  R to return here anytime', W / 2, 360);
}

// ─── Draw ──────────────────────────────────────────────────────────────────
function draw() {
  if (state === 'menu') { drawMenu(); return; }
  ctx.clearRect(0, 0, W, H);

  const level = LEVELS[levelIndex];

  // Platforms
  for (const p of level.platforms) {
    // Top grass stripe
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(p.x, p.y, p.w, 6);
    // Dirt body
    ctx.fillStyle = '#8B5E3C';
    ctx.fillRect(p.x, p.y + 6, p.w, p.h - 6);
  }

  // Spikes
  for (const s of level.spikes) drawSpike(s);

  // Coins
  for (let i = 0; i < level.coins.length; i++) {
    if (!coinsCollected[i]) drawCoin(level.coins[i], i);
  }

  // Goal
  const allCoins = coinsCollected.every(Boolean);
  drawGoal(level.goal, !allCoins);

  // Player
  drawPlayer();

  // Win screen
  if (state === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffe66d';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    if (levelIndex >= MAIN_LEVELS) {
      ctx.fillText('BONUS COMPLETE!', W / 2, H / 2 - 40);
      ctx.font = '22px monospace';
      ctx.fillStyle = '#f5a623';
      ctx.fillText('You are a true platformer master!', W / 2, H / 2 + 10);
    } else {
      ctx.fillText('YOU WIN!', W / 2, H / 2 - 40);
    }
    ctx.font = '22px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText(`Completed in ${deaths} death${deaths === 1 ? '' : 's'}`, W / 2, H / 2 + 40);
    ctx.fillText('Press R to return to menu', W / 2, H / 2 + 75);
    // Mode badge in top-right
    ctx.textAlign = 'right';
    ctx.font = 'bold 13px monospace';
    ctx.fillStyle = gameMode === 'hard' ? 'rgba(233,69,96,0.8)' : 'rgba(46,204,113,0.7)';
    ctx.fillText(gameMode === 'hard' ? 'HARD MODE' : 'EASY MODE', W - 10, 20);
  }

  // Bonus locked screen — beat level 10 but too many deaths
  if (state === 'bonus_locked') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 36px monospace';
    ctx.fillText('BONUS LEVELS LOCKED', W / 2, H / 2 - 60);
    ctx.fillStyle = '#ffe66d';
    ctx.font = '20px monospace';
    ctx.fillText(`You finished with ${deaths} deaths.`, W / 2, H / 2 - 10);
    ctx.fillStyle = '#aaa';
    ctx.font = '18px monospace';
    ctx.fillText(`Beat levels 1-10 in under ${BONUS_DEATH_LIMIT} deaths`, W / 2, H / 2 + 25);
    ctx.fillText('to unlock 5 bonus levels!', W / 2, H / 2 + 55);
    ctx.fillStyle = '#555';
    ctx.font = '14px monospace';
    ctx.fillText('Press R to return to menu', W / 2, H / 2 + 100);
    // Mode badge
    ctx.textAlign = 'right';
    ctx.font = 'bold 13px monospace';
    ctx.fillStyle = gameMode === 'hard' ? 'rgba(233,69,96,0.8)' : 'rgba(46,204,113,0.7)';
    ctx.fillText(gameMode === 'hard' ? 'HARD MODE' : 'EASY MODE', W - 10, 20);
  }

  // Level label in corner
  if (state === 'playing') {
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.font = '14px monospace';
    ctx.textAlign = 'left';
    const isBonus = levelIndex >= MAIN_LEVELS;
    if (isBonus) {
      ctx.fillStyle = 'rgba(245,166,35,0.25)';
      ctx.fillText(`BONUS ${levelIndex - MAIN_LEVELS + 1} of 5`, 10, 20);
    } else {
      ctx.fillText(`Level ${levelIndex + 1} of ${MAIN_LEVELS}`, 10, 20);
    }
    // Mode badge
    ctx.textAlign = 'right';
    ctx.fillStyle = gameMode === 'hard' ? 'rgba(233,69,96,0.6)' : 'rgba(46,204,113,0.5)';
    ctx.font = 'bold 13px monospace';
    ctx.fillText(gameMode === 'hard' ? 'HARD MODE' : 'EASY MODE', W - 10, 20);
  }
}

// Restart on R → back to menu
window.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    state = 'menu';
  }
  // Debug: M to skip to next level
  if ((e.key === 'm' || e.key === 'M') && state === 'playing') {
    if (levelIndex + 1 < LEVELS.length) {
      loadLevel(levelIndex + 1);
    } else {
      state = 'win';
    }
  }
});

// Menu click handling
canvas.addEventListener('click', e => {
  if (state !== 'menu') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const b = MENU_EASY_BTN;
  if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
    startGame('easy');
  }
  const h = MENU_HARD_BTN;
  if (mx >= h.x && mx <= h.x + h.w && my >= h.y && my <= h.y + h.h) {
    startGame('hard');
  }
});

// ─── Game loop ─────────────────────────────────────────────────────────────
const TARGET_FRAME = 1000 / 60; // 16.67 ms — the speed the game was designed for
let lastTime = null;

function loop(timestamp) {
  if (lastTime === null) lastTime = timestamp;
  // dt = 1.0 at 60 fps, 0.5 at 120 fps, 2.0 at 30 fps — capped to avoid huge jumps
  const dt = Math.min((timestamp - lastTime) / TARGET_FRAME, 3);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
